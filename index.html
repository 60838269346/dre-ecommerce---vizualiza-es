<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE por Canal - Visão por Ano, Mês a Mês e Acumulado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-600 p-2.5 rounded-lg text-white">
                    <i class="fa-solid fa-chart-pie text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">DRE Individualizada por Canal</h1>
                    <p class="text-xs text-slate-400">Visão Anual, Mês a Mês e Acumulado</p>
                </div>
            </div>
            <div>
                <button onclick="toggleAdminModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Novo Lançamento</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Canal de Venda</h3>
                <div id="canais-botoes" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Exercício (Ano)</label>
                <select id="filtro-ano" onchange="atualizarAnoFiltro()" class="border border-slate-300 rounded-lg p-2 text-xs font-semibold">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
                <h2 id="titulo-dre-canal" class="font-bold text-slate-800 text-base">DRE - Canal</h2>
                <p class="text-xs text-slate-500">Valores consolidados por mês</p>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr id="dre-thead-tr" class="bg-slate-100 text-slate-700 font-semibold border-b border-slate-200"></tr>
                    </thead>
                    <tbody id="dre-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="admin-modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full overflow-hidden">
            <div class="px-6 py-4 bg-slate-900 text-white flex justify-between items-center">
                <h3 class="font-bold text-base">Novo Lançamento</h3>
                <button onclick="toggleAdminModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Mês</label>
                        <select id="lanc-mes" class="w-full border rounded-lg p-2 text-sm">
                            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                            <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Ano</label>
                        <select id="lanc-ano" class="w-full border rounded-lg p-2 text-sm">
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Canal</label>
                    <select id="lanc-canal" class="w-full border rounded-lg p-2 text-sm">
                        <option value="1) IFOOD">1) IFOOD</option>
                        <option value="2) APP/SITE">2) APP/SITE</option>
                        <option value="3) MARKETPLACE">3) MARKETPLACE</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Tipo</label>
                        <select id="lanc-tipo" class="w-full border rounded-lg p-2 text-sm">
                            <option value="receita_bruta">Receita Bruta (Vendas)</option>
                            <option value="impostos">(-) Impostos</option>
                            <option value="cmv">(-) CMV</option>
                            <option value="pessoal">(-) Pessoal</option>
                            <option value="comercial">(-) Comercial</option>
                            <option value="fretes">(-) Frete</option>
                            <option value="administrativas">(-) Administrativas</option>
                            <option value="tributarias">(-) Tributárias</option>
                            <option value="outras_despesas">(-) Outras Despesas</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Valor (R$)</label>
                        <input type="number" id="lanc-valor" step="any" class="w-full border rounded-lg p-2 text-sm" placeholder="0.00">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Descrição</label>
                    <input type="text" id="lanc-desc" class="w-full border rounded-lg p-2 text-sm" placeholder="Histórico">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button onclick="toggleAdminModal()" class="px-4 py-2 border rounded-lg text-sm">Cancelar</button>
                    <button onclick="adicionarLancamento()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mesesNomes = {"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};
        const canais = [{id:"1) IFOOD", nome:"1) IFOOD"}, {id:"2) APP/SITE", nome:"2) APP/SITE"}, {id:"3) MARKETPLACE", nome:"3) MARKETPLACE"}];
        let canalAtivo = "1) IFOOD";
        let anoAtivo = "2026";

        let lancamentos = JSON.parse(localStorage.getItem('dre_canais_v1')) || [
            {canal: "1) IFOOD", tipo: "receita_bruta", valor: 5000, mes: "01", ano: "2026"}
        ];

        function formatarMoeda(val) {
            let abs = Math.abs(val).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            return val < 0 ? `(${abs})` : abs;
        }

        function renderizarBotoes() {
            const container = document.getElementById('canais-botoes');
            container.innerHTML = '';
            canais.forEach(c => {
                let btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg text-xs font-bold ${c.id === canalAtivo ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'}`;
                btn.innerText = c.nome;
                btn.onclick = () => { canalAtivo = c.id; renderizarBotoes(); calcularDRE(); };
                container.appendChild(btn);
            });
        }

        function atualizarAnoFiltro() {
            anoAtivo = document.getElementById('filtro-ano').value;
            calcularDRE();
        }

        function toggleAdminModal() {
            document.getElementById('admin-modal').classList.toggle('hidden');
        }

        function adicionarLancamento() {
            let mes = document.getElementById('lanc-mes').value;
            let ano = document.getElementById('lanc-ano').value;
            let canal = document.getElementById('lanc-canal').value;
            let tipo = document.getElementById('lanc-tipo').value;
            let valor = parseFloat(document.getElementById('lanc-valor').value);

            if (isNaN(valor)) {
                alert('Informe um valor válido');
                return;
            }

            lancamentos.push({canal, tipo, valor, mes, ano});
            localStorage.setItem('dre_canais_v1', JSON.stringify(lancamentos));

            document.getElementById('lanc-valor').value = '';
            canalAtivo = canal;
            anoAtivo = ano;
            document.getElementById('filtro-ano').value = ano;

            renderizarBotoes();
            calcularDRE();
            toggleAdminModal();
        }

        function calcularDRE() {
            document.getElementById('titulo-dre-canal').innerText = `DRE - ${canalAtivo} (${anoAtivo})`;
            let filtrados = lancamentos.filter(l => l.canal === canalAtivo && l.ano === anoAtivo);
            let meses = Object.keys(mesesNomes);

            let thead = document.getElementById('dre-thead-tr');
            let hHtml = '<th class="py-3 px-4">Linha</th>';
            meses.forEach(m => hHtml += `<th class="py-3 px-2 text-right">${mesesNomes[m].substring(0,3)}</th>`);
            hHtml += `<th class="py-3 px-3 text-right bg-slate-200">Acumulado</th>`;
            thead.innerHTML = hHtml;

            let dados = {};
            meses.forEach(m => {
                dados[m] = {receita_bruta:0, impostos:0, receita_liquida:0, cmv:0, lucro_bruto:0, pessoal:0, comercial:0, fretes:0, administrativas:0, tributarias:0, outras_despesas:0, total_desp:0, ebitda:0};
            });

            filtrados.forEach(l => {
                if(dados[l.mes] && dados[l.mes][l.tipo] !== undefined) {
                    dados[l.mes][l.tipo] += l.valor;
                }
            });

            meses.forEach(m => {
                let d = dados[m];
                d.receita_liquida = d.receita_bruta - d.impostos;
                d.lucro_bruto = d.receita_liquida - d.cmv;
                d.total_desp = d.pessoal + d.comercial + d.fretes + d.administrativas + d.tributarias + d.outras_despesas;
                d.ebitda = d.lucro_bruto - d.total_desp;
            });

            let acum = {receita_bruta:0, impostos:0, receita_liquida:0, cmv:0, lucro_bruto:0, pessoal:0, comercial:0, fretes:0, administrativas:0, tributarias:0, outras_despesas:0, total_desp:0, ebitda:0};
            meses.forEach(m => {
                Object.keys(acum).forEach(k => acum[k] += dados[m][k]);
            });

            const tbody = document.getElementById('dre-table-body');
            tbody.innerHTML = '';

            function linha(nome, fn, bold=false) {
                let tr = document.createElement('tr');
                if(bold) tr.className = 'bg-slate-100 font-bold';
                let html = `<td class="px-4 py-2">${nome}</td>`;
                meses.forEach(m => html += `<td class="px-2 py-2 text-right">${formatarMoeda(fn(dados[m]))}</td>`);
                html += `<td class="px-3 py-2 text-right bg-slate-50 font-bold">${formatarMoeda(fn(acum))}</td>`;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            }

            linha("Receita Bruta", d => d.receita_bruta, true);
            linha("(-) Impostos", d => d.impostos);
            linha("(=) Receita Líquida", d => d.receita_liquida, true);
            linha("(-) CMV", d => d.cmv);
            linha("(=) Lucro Bruto", d => d.lucro_bruto, true);
            linha("(-) Despesas Operacionais", d => d.total_desp, true);
            linha("(=) EBITDA", d => d.ebitda, true);
        }

        renderizarBotoes();
        calcularDRE();
    </script>
</body>
</html>
