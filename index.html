<script>
    let canalAtual = 'IFOOD';
    let anoAtual = '2026';
    let listaLancamentos = JSON.parse(localStorage.getItem('dre_lancamentos')) || [];

    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    
    const nomesContas = {
        'receitaBruta': 'Receita Bruta Total',
        'impostos': '(-) Impostos sobre Vendas',
        'cmv': '(-) Custo das Mercadorias Vendidas (CMV)',
        'pessoal': '• Gastos com Pessoal',
        'comercial': '• Despesas Comerciais / Embalagens',
        'fretes': '• Fretes / Entrega Cliente',
        'administrativas': '• Despesas Administrativas',
        'tributarias': '• Despesas Tributárias',
        'outras': '• Outras Despesas Operacionais'
    };

    function getVal(canal, mes, conta) {
        let soma = 0;
        listaLancamentos.forEach(l => {
            if (l.ano === anoAtual && l.canal === canal && l.mes === mes && l.conta === conta) {
                soma += Number(l.valor) || 0;
            }
        });
        return soma;
    }

    const estruturaDRE = [
        { id: 'receitaBruta', nome: 'Receita Bruta Total', tipo: 'cabecalho', formula: null },
        { id: 'impostos', nome: '(-) Impostos sobre Vendas', tipo: 'linha', formula: null, deducao: true },
        { 
            id: 'receitaLiquida', 
            nome: '(=) Receita Líquida', 
            tipo: 'total', 
            formula: (c, m) => getVal(c, m, 'receitaBruta') - Math.abs(getVal(c, m, 'impostos')) 
        },
        { id: 'cmv', nome: '(-) Custo das Mercadorias Vendidas (CMV)', tipo: 'linha', formula: null, deducao: true },
        { 
            id: 'lucroBruto', 
            nome: '(=) Lucro Bruto', 
            tipo: 'total', 
            formula: (c, m) => {
                let recLiq = getVal(c, m, 'receitaBruta') - Math.abs(getVal(c, m, 'impostos'));
                let custoMv = Math.abs(getVal(c, m, 'cmv'));
                return recLiq - custoMv;
            } 
        },
        { 
            id: 'despesasOperacionais', 
            nome: '(-) Despesas Operacionais (SG&A Totais)', 
            tipo: 'total', 
            formula: (c, m) => {
                return Math.abs(getVal(c, m, 'pessoal')) + 
                       Math.abs(getVal(c, m, 'comercial')) + 
                       Math.abs(getVal(c, m, 'fretes')) + 
                       Math.abs(getVal(c, m, 'administrativas')) + 
                       Math.abs(getVal(c, m, 'tributarias')) + 
                       Math.abs(getVal(c, m, 'outras'));
            } 
        },
        { id: 'pessoal', nome: '• Gastos com Pessoal', tipo: 'sublinha', formula: null, deducao: true },
        { id: 'comercial', nome: '• Despesas Comerciais / Embalagens', tipo: 'sublinha', formula: null, deducao: true },
        { id: 'fretes', nome: '• Fretes / Entrega Cliente', tipo: 'sublinha', formula: null, deducao: true },
        { id: 'administrativas', nome: '• Despesas Administrativas', tipo: 'sublinha', formula: null, deducao: true },
        { id: 'tributarias', nome: '• Despesas Tributárias', tipo: 'sublinha', formula: null, deducao: true },
        { id: 'outras', nome: '• Outras Despesas Operacionais', tipo: 'sublinha', formula: null, deducao: true },
        { 
            id: 'ebitda', 
            nome: '(=) EBITDA / Resultado Operacional', 
            tipo: 'total-destaque', 
            formula: (c, m) => {
                let recLiq = getVal(c, m, 'receitaBruta') - Math.abs(getVal(c, m, 'impostos'));
                let lucroB = recLiq - Math.abs(getVal(c, m, 'cmv'));
                let desps = Math.abs(getVal(c, m, 'pessoal')) + 
                            Math.abs(getVal(c, m, 'comercial')) + 
                            Math.abs(getVal(c, m, 'fretes')) + 
                            Math.abs(getVal(c, m, 'administrativas')) + 
                            Math.abs(getVal(c, m, 'tributarias')) + 
                            Math.abs(getVal(c, m, 'outras'));
                return lucroB - desps;
            } 
        }
    ];

    window.mudarCanal = function(canal) {
        canalAtual = canal;
        document.querySelectorAll('.canal-btn').forEach(b => {
            if(b.dataset.canal === canal) {
                b.className = "px-4 py-1.5 text-sm font-semibold rounded-md transition canal-btn bg-white text-indigo-900 shadow-sm";
            } else {
                b.className = "px-4 py-1.5 text-sm font-semibold rounded-md transition canal-btn text-slate-600 hover:text-indigo-900";
            }
        });
        renderizarTabela();
    }

    window.mudarAno = function(ano) {
        anoAtual = ano;
        renderizarTabela();
    }

    function formatarMoeda(val, ehDeducao = false) {
        if (val === 0) return 'R$ 0,00';
        let absVal = Math.abs(val);
        let formatado = absVal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        if (val < 0 || ehDeducao) {
            return `(${formatado.replace('R$', 'R$ ')})`;
        }
        return formatado;
    }

    function formatarPercentual(val) {
        if (val === 0) return '0,00%';
        if (val < 0) {
            return `(${Math.abs(val).toFixed(2).replace('.', ',')}%)`;
        }
        return val.toFixed(2).replace('.', ',') + '%';
    }

    function renderizarTabela() {
        const elTitulo = document.getElementById('titulo-tabela');
        if (elTitulo) elTitulo.innerText = `DRE Detalhada - ${canalAtual} (${anoAtual})`;
        
        const labelBaseAV = document.querySelector('.bg-slate-50.flex .text-xs.text-slate-500') || document.querySelector('.bg-slate-50\\/50.flex > .text-xs.text-slate-500');
        if(labelBaseAV) labelBaseAV.innerText = "Base A.V.: Receita Líquida do Canal (100%)";

        const tbody = document.getElementById('corpo-dre');
        if (!tbody) return;
        tbody.innerHTML = '';

        estruturaDRE.forEach(item => {
            let tr = document.createElement('tr');
            let estiloLinha = "p-3 font-medium";
            if(item.tipo === 'cabecalho' || item.tipo === 'total' || item.tipo === 'total-destaque') {
                estiloLinha = "p-3 font-bold bg-slate-50/80 text-indigo-950";
            }
            if(item.tipo === 'sublinha') {
                estiloLinha = "p-3 pl-6 text-slate-600 text-xs";
            }

            let html = `<td class="${estiloLinha}">${item.nome}</td>`;
            
            let totalAcumuladoAno = 0;
            let receitaLiquidaAnoTotal = 0;

            for(let m = 0; m < 12; m++) {
                let rb = getVal(canalAtual, m, 'receitaBruta');
                let imp = Math.abs(getVal(canalAtual, m, 'impostos'));
                receitaLiquidaAnoTotal += (rb - imp);
            }

            for(let m = 0; m < 12; m++) {
                let val = item.formula ? item.formula(canalAtual, m) : getVal(canalAtual, m, item.id);
                if (item.deducao && val > 0) val = -val;
                totalAcumuladoAno += val;

                let rbMes = getVal(canalAtual, m, 'receitaBruta');
                let impMes = Math.abs(getVal(canalAtual, m, 'impostos'));
                let receitaLiquidaMes = rbMes - impMes;

                let avMes = receitaLiquidaMes > 0 ? (Math.abs(val) / receitaLiquidaMes) * 100 : 0;

                html += `<td class="p-3 text-right">${formatarMoeda(val, item.deducao)}</td>`;
                html += `<td class="p-3 text-right text-slate-400 text-[11px]">${formatarPercentual(avMes)}</td>`;
            }

            let avAcumulado = receitaLiquidaAnoTotal > 0 ? (Math.abs(totalAcumuladoAno) / receitaLiquidaAnoTotal) * 100 : 0;

            html += `<td class="p-3 text-right font-bold bg-indigo-50/40">${formatarMoeda(totalAcumuladoAno, item.deducao)}</td>`;
            html += `<td class="p-3 text-right font-bold text-indigo-800 bg-indigo-50/40 text-[11px]">${formatarPercentual(avAcumulado)}</td>`;

            tr.innerHTML = html;
            tbody.appendChild(tr);
        });

        renderizarListaLancamentos();
    }

    function renderizarListaLancamentos() {
        const tbody = document.getElementById('lista-lancamentos');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (listaLancamentos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-slate-400">Nenhum lançamento realizado ainda.</td></tr>`;
            return;
        }
        listaLancamentos.forEach((l, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-2 text-slate-400">#${index + 1}</td>
                <td class="p-2 font-semibold">${l.canal}</td>
                <td class="p-2">${l.ano}</td>
                <td class="p-2">${nomesMeses[l.mes]}</td>
                <td class="p-2">${nomesContas[l.conta] || l.conta}</td>
                <td class="p-2 text-right font-bold">${formatarMoeda(l.valor, false)}</td>
                <td class="p-2 text-center">
                    <button onclick="excluirLancamento(${index})" class="bg-rose-100 text-rose-700 hover:bg-rose-200 px-2.5 py-1 rounded text-xs font-semibold transition">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.abrirModalLancamento = function() {
        const modal = document.getElementById('modal-lancamento');
        if (modal) modal.classList.remove('hidden');
    }

    window.fecharModalLancamento = function() {
        const modal = document.getElementById('modal-lancamento');
        if (modal) modal.classList.add('hidden');
        const form = document.getElementById('form-lancamento');
        if (form) form.reset();
    }

    window.salvarLancamento = function(e) {
        e.preventDefault();
        const novoLancamento = {
            canal: document.getElementById('modal-canal').value,
            ano: document.getElementById('modal-ano').value,
            mes: parseInt(document.getElementById('modal-mes').value),
            conta: document.getElementById('modal-conta').value,
            valor: parseFloat(document.getElementById('modal-valor').value)
        };
        listaLancamentos.push(novoLancamento);
        localStorage.setItem('dre_lancamentos', JSON.stringify(listaLancamentos));
        fecharModalLancamento();
        renderizarTabela();
    }

    window.excluirLancamento = function(index) {
        if (confirm('Deseja realmente excluir este lançamento?')) {
            listaLancamentos.splice(index, 1);
            localStorage.setItem('dre_lancamentos', JSON.stringify(listaLancamentos));
            renderizarTabela();
        }
    }

    window.exportarExcel = function() {
        alert('Funcionalidade de exportar Excel pronta!');
    }

    window.exportarPDF = function() {
        alert('Funcionalidade de exportar PDF pronta!');
    }

    renderizarTabela();
</script>
