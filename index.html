<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE - Demonstração do Resultado do Exercício com Análise Vertical Mensal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <!-- Cabeçalho -->
    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-600 p-2.5 rounded-lg text-white">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">DRE & Análise Vertical Mensal</h1>
                    <p class="text-xs text-slate-400">E-commerce - Gestão Sintética</p>
                </div>
            </div>
            <div>
                <button onclick="toggleAdminModal()" id="btn-admin" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center space-x-2">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Novo Lançamento</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        <!-- Tabela DRE Mês a Mês -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                <h2 class="font-bold text-slate-800"><i class="fa-solid fa-table text-slate-500 mr-2"></i> Demonstração do Resultado - Visão Mensal (Valores e A.V. %)</h2>
                <div class="text-xs text-slate-500">Base A.V.: Receita Líquida do Mês (100%)</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="bg-slate-100/70 text-slate-700 font-semibold border-b border-slate-200">
                            <th class="py-3 px-4 min-w-[220px]">Grupo / Conta Sintética</th>
                            <!-- Meses gerados dinamicamente via JS -->
                        </tr>
                    </thead>
                    <tbody id="dre-table-body" class="divide-y divide-slate-100 text-slate-700">
                        <!-- Preenchido via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Lançamentos -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full overflow-hidden">
            <div class="px-6 py-4 bg-slate-900 text-white flex justify-between items-center">
                <h3 class="font-bold text-base"><i class="fa-solid fa-pen-to-square mr-2"></i> Novo Lançamento na DRE</h3>
                <button onclick="toggleAdminModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Mês de Competência</label>
                        <select id="lanc-mes" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                            <option value="01">Janeiro</option>
                            <option value="02">Fevereiro</option>
                            <option value="03">Março</option>
                            <option value="04">Abril</option>
                            <option value="05">Maio</option>
                            <option value="06">Junho</option>
                            <option value="07">Julho</option>
                            <option value="08">Agosto</option>
                            <option value="09">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Ano</label>
                        <input type="number" id="lanc-ano" value="2026" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Selecione a Conta / Canal</label>
                    <select id="lanc-conta" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                        <!-- Preenchido dinamicamente -->
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Valor (R$)</label>
                    <input type="number" id="lanc-valor" step="0.01" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Descrição / Histórico</label>
                    <input type="text" id="lanc-desc" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="Ex: Histórico do lançamento...">
                </div>
                <div class="pt-2 flex justify-end space-x-3">
                    <button onclick="toggleAdminModal()" class="px-4 py-2 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50">Cancelar</button>
                    <button onclick="adicionarLancamento()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 shadow-sm">Salvar Lançamento</button>
                </div>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100">
                <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">Lançamentos Recentes</h4>
                <div id="lista-lancamentos-recentes" class="max-h-32 overflow-y-auto space-y-1 text-xs text-slate-600"></div>
            </div>
        </div>
    </div>

    <!-- Lógica da Aplicação -->
    <script>
        const mesesNomes = {
            "01": "Janeiro", "02": "Fevereiro", "03": "Março", "04": "Abril",
            "05": "Maio", "06": "Junho", "07": "Julho", "08": "Agosto",
            "09": "Setembro", "10": "Outubro", "11": "Novembro", "12": "Dezembro"
        };

        const estruturaContas = {
            "3.1.1.01.001": { nome: "Receita Bruta - Geral", tipo: "rec_bruta" },
            "3.1.1.02.001": { nome: "Receita - App", tipo: "rec_bruta" },
            "3.1.1.02.002": { nome: "Receita - Assinatura", tipo: "rec_bruta" },
            "3.1.1.02.003": { nome: "Receita - iFood", tipo: "rec_bruta" },
            "3.1.1.02.004": { nome: "Receita - Mercado Livre", tipo: "rec_bruta" },
            "3.1.1.02.005": { nome: "Receita - Renovação", tipo: "rec_bruta" },
            "3.1.1.02.006": { nome: "Receita - Site", tipo: "rec_bruta" },
            "3.1.3.01.001": { nome: "Impostos sobre Vendas", tipo: "imposto" },
            "4.1.1.01.001": { nome: "Custo das Mercadorias Vendidas (CMV)", tipo: "cmv" },
            "4.2.1.02.001": { nome: "Gastos com Pessoal", tipo: "sga_pessoal" },
            "4.2.1.01.002": { nome: "Despesas Comerciais / Embalagens", tipo: "sga_comercial" },
            "4.2.1.01.115": { nome: "Frete Entrega Cliente", tipo: "sga_distribuicao" },
            "4.2.1.03.003": { nome: "Despesas Administrativas", tipo: "sga_adm" },
            "4.2.1.08.017": { nome: "Despesas Tributárias", tipo: "sga_tributaria" },
            "4.5.1.01.001": { nome: "Outras Despesas Operacionais", tipo: "outras_desp_op" }
        };

        let lancamentos = JSON.parse(localStorage.getItem('dre_lancamentos')) || [
            { conta: "3.1.1.02.006", valor: 500000.00, desc: "Site - Jan", mes: "01", ano: "2026" },
            { conta: "3.1.1.02.003", valor: 300000.00, desc: "iFood - Jan", mes: "01", ano: "2026" },
            { conta: "3.1.3.01.001", valor: -80000.00, desc: "Impostos - Jan", mes: "01", ano: "2026" },
            { conta: "4.1.1.01.001", valor: -250000.00, desc: "CMV - Jan", mes: "01", ano: "2026" }
        ];

        function popularSelectContas() {
            const select = document.getElementById('lanc-conta');
            select.innerHTML = '';
            Object.keys(estruturaContas).forEach(codigo => {
                let opt = document.createElement('option');
                opt.value = codigo;
                opt.innerText = estruturaContas[codigo].nome;
                select.appendChild(opt);
            });
        }

        function formatarMoeda(valor) {
            let absVal = Math.abs(valor);
            let formatado = absVal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            return valor < 0 ? `(${formatado})` : formatado;
        }

        function formatarPercentual(valor) {
            return valor.toFixed(2).replace('.', ',') + '%';
        }

        function toggleAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.toggle('hidden');
            renderizarLancamentosRecentes();
        }

        function adicionarLancamento() {
            const mes = document.getElementById('lanc-mes').value;
            const ano = document.getElementById('lanc-ano').value;
            const conta = document.getElementById('lanc-conta').value;
            let valor = parseFloat(document.getElementById('lanc-valor').value);
            const desc = document.getElementById('lanc-desc').value || estruturaContas[conta].nome;
            
            if (isNaN(valor)) {
                alert('Por favor, informe um valor válido.');
                return;
            }

            lancamentos.push({ conta, valor, desc, mes, ano });
            localStorage.setItem('dre_lancamentos', JSON.stringify(lancamentos));
            document.getElementById('lanc-valor').value = '';
            document.getElementById('lanc-desc').value = '';
            calcularEAtualizarDRE();
            toggleAdminModal();
        }

        function removerLancamento(index) {
            lancamentos.splice(index, 1);
            localStorage.setItem('dre_lancamentos', JSON.stringify(lancamentos));
            renderizarLancamentosRecentes();
            calcularEAtualizarDRE();
        }

        function renderizarLancamentosRecentes() {
            const container = document.getElementById('lista-lancamentos-recentes');
            container.innerHTML = '';
            if (lancamentos.length === 0) {
                container.innerHTML = '<p class="text-slate-400">Nenhum lançamento registrado.</p>';
                return;
            }
            lancamentos.slice().reverse().forEach((l, idx) => {
                const realIdx = lancamentos.length - 1 - idx;
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-white p-2 rounded border border-slate-200';
                div.innerHTML = `<span><strong>${l.mes}/${l.ano} - ${estruturaContas[l.conta]?.nome || l.conta}</strong>: ${formatarMoeda(l.valor)}</span> <button onclick="removerLancamento(${realIdx})" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>`;
                container.appendChild(div);
            });
        }

        function calcularEAtualizarDRE() {
            // Identificar meses presentes nos lançamentos
            let mesesAtivos = [...new Set(lancamentos.map(l => l.mes))].sort();
            if (mesesAtivos.length === 0) mesesAtivos = ["01"];

            // Construir cabeçalho da tabela (Mês e A.V. para cada um)
            const theadTr = document.querySelector('thead tr');
            theadTr.innerHTML = '<th class="py-3 px-4 min-w-[220px]">Grupo / Conta Sintética</th>';
            mesesAtivos.forEach(mes => {
                theadTr.innerHTML += `<th class="py-3 px-3 text-right">${mesesNomes[mes]} (R$)</th><th class="py-3 px-3 text-right">A.V. (%)</th>`;
            });

            const tbody = document.getElementById('dre-table-body');
            tbody.innerHTML = '';

            // Estruturar dados por mês
            let dadosMes = {};
            mesesAtivos.forEach(mes => {
                dadosMes[mes] = {
                    totaisPorConta: {},
                    recBruta: 0, recApp: 0, recAssinatura: 0, recIfood: 0, recMercadoLivre: 0, recRenovacao: 0, recSite: 0,
                    impostos: 0, cmv: 0, sgaPessoal: 0, sgaComercial: 0, sgaDistribuicao: 0, sgaAdm: 0, sgaTributaria: 0, outrasDespOp: 0
                };
                Object.keys(estruturaContas).forEach(c => dadosMes[mes].totaisPorConta[c] = 0);
            });

            lancamentos.forEach(l => {
                let m = l.mes || "01";
                if (!dadosMes[m]) {
                    dadosMes[m] = { totaisPorConta: {}, recBruta: 0, recApp: 0, recAssinatura: 0, recIfood: 0, recMercadoLivre: 0, recRenovacao: 0, recSite: 0, impostos: 0, cmv: 0, sgaPessoal: 0, sgaComercial: 0, sgaDistribuicao: 0, sgaAdm: 0, sgaTributaria: 0, outrasDespOp: 0 };
                    Object.keys(estruturaContas).forEach(c => dadosMes[m].totaisPorConta[c] = 0);
                }
                dadosMes[m].totaisPorConta[l.conta] = (dadosMes[m].totaisPorConta[l.conta] || 0) + l.valor;
            });

            // Processar valores por mês
            mesesAtivos.forEach(mes => {
                let dm = dadosMes[mes];
                Object.keys(dm.totaisPorConta).forEach(conta => {
                    let val = dm.totaisPorConta[conta];
                    let info = estruturaContas[conta];
                    if (info.tipo === 'rec_bruta') {
                        dm.recBruta += val;
                        if (conta === "3.1.1.02.001") dm.recApp += val;
                        if (conta === "3.1.1.02.002") dm.recAssinatura += val;
                        if (conta === "3.1.1.02.003") dm.recIfood += val;
                        if (conta === "3.1.1.02.004") dm.recMercadoLivre += val;
                        if (conta === "3.1.1.02.005") dm.recRenovacao += val;
                        if (conta === "3.1.1.02.006") dm.recSite += val;
                    }
                    if (info.tipo === 'imposto') dm.impostos += val;
                    if (info.tipo === 'cmv') dm.cmv += val;
                    if (info.tipo === 'sga_pessoal') dm.sgaPessoal += val;
                    if (info.tipo === 'sga_comercial') dm.sgaComercial += val;
                    if (info.tipo === 'sga_distribuicao') dm.sgaDistribuicao += val;
                    if (info.tipo === 'sga_adm') dm.sgaAdm += val;
                    if (info.tipo === 'sga_tributaria') dm.sgaTributaria += val;
                    if (info.tipo === 'outras_desp_op') dm.outrasDespOp += val;
                });
                dm.recLiquida = dm.recBruta - Math.abs(dm.impostos);
                dm.lucroBruto = dm.recLiquida - Math.abs(dm.cmv);
                dm.totalSgaVal = Math.abs(dm.sgaPessoal) + Math.abs(dm.sgaComercial) + Math.abs(dm.sgaDistribuicao) + Math.abs(dm.sgaAdm) + Math.abs(dm.sgaTributaria) + Math.abs(dm.outrasDespOp);
                dm.ebitda = dm.lucroBruto - dm.totalSgaVal;
            });

            // Função auxiliar para renderizar linhas comparativas entre os meses
            function adicionarLinhaDRE(nome, seletorValor, isHeader = false, isSubtotal = false, forcarParenteses = false) {
                let tr = document.createElement('tr');
                if (isHeader) {
                    tr.className = 'bg-slate-100 font-bold text-slate-900';
                } else if (isSubtotal) {
                    tr.className = 'bg-slate-50 font-semibold text-slate-800 border-t border-b border-slate-200';
                } else {
                    tr.className = 'hover:bg-slate-50/80 transition';
                }

                let html = `<td class="px-4 py-2.5">${nome}</td>`;
                mesesAtivos.forEach(mes => {
                    let dm = dadosMes[mes];
                    let val = seletorValor(dm);
                    let baseAV = dm.recLiquida > 0 ? dm.recLiquida : 1;
                    let av = (Math.abs(val) / baseAV) * 100;
                    let valExibicao = forcarParenteses && val > 0 ? -val : val;

                    html += `
                        <td class="py-2.5 px-3 text-right font-medium">${formatarMoeda(valExibicao)}</td>
                        <td class="py-2.5 px-3 text-right text-slate-500">${formatarPercentual(av)}</td>
                    `;
                });
                tr.innerHTML = html;
                tbody.appendChild(tr);
            }

            // Linhas da DRE estruturadas conforme solicitado
            adicionarLinhaDRE("Receita Bruta Total", dm => dm.recBruta, true, false);
            adicionarLinhaDRE("    • App", dm => dm.recApp, false, false);
            adicionarLinhaDRE("    • Assinatura", dm => dm.recAssinatura, false, false);
            adicionarLinhaDRE("    • iFood", dm => dm.recIfood, false, false);
            adicionarLinhaDRE("    • Mercado Livre", dm => dm.recMercadoLivre, false, false);
            adicionarLinhaDRE("    • Renovação", dm => dm.recRenovacao, false, false);
            adicionarLinhaDRE("    • Site", dm => dm.recSite, false, false);
            
            adicionarLinhaDRE("(-) Impostos sobre Vendas", dm => dm.impostos, false, false, true);
            adicionarLinhaDRE("(=) Receita Líquida", dm => dm.recLiquida, false, true);
            adicionarLinhaDRE("(-) Custo das Mercadorias Vendidas (CMV)", dm => dm.cmv, true, false, true);
            adicionarLinhaDRE("(=) Lucro Bruto", dm => dm.lucroBruto, false, true);
            adicionarLinhaDRE("(-) Despesas Operacionais (SG&A)", dm => dm.totalSgaVal, true, false, true);
            adicionarLinhaDRE("    • Gastos com Pessoal", dm => dm.sgaPessoal, false, false, true);
            adicionarLinhaDRE("    • Despesas Comerciais", dm => dm.sgaComercial, false, false, true);
            adicionarLinhaDRE("    • Fretes e Distribuição", dm => dm.sgaDistribuicao, false, false, true);
            adicionarLinhaDRE("    • Despesas Administrativas", dm => dm.sgaAdm, false, false, true);
            adicionarLinhaDRE("(=) EBITDA", dm => dm.ebitda, false, true);
        }

        popularSelectContas();
        calcularEAtualizarDRE();
    </script>
</body>
</html>
